<h2>Available Courses</h2>

<p *ngIf="loading$ | async">Loading courses...</p>

<div *ngIf="(loading$ | async) === false">
  <div *ngFor="let course of courses$ | async; trackBy: trackByCourseId">
    <app-course-card
      [course]="course"
      (viewCourse)="viewCourse($event)"
      (deleteCourseEvent)="deleteCourse($event)"
    >
    </app-course-card>
  </div>
</div>
