<h2>Edit Course</h2>

<div *ngIf="course">
  <label>Course Name</label>
  <input type="text" [(ngModel)]="course.name" />

  <br /><br />

  <label>Course Code</label>
  <input type="text" [(ngModel)]="course.code" />

  <br /><br />

  <label>Credits</label>
  <input type="number" [(ngModel)]="course.credits" />

  <br /><br />

  <button (click)="updateCourse()">Update Course</button>
</div>
