<div class="container" style="max-width: 600px;">
  <div class="card" *ngIf="course">
    <h2>Edit Course</h2>
    <p style="margin-bottom: 24px;">Modify course catalog details for "{{ course.name }}".</p>

    <div class="form-group">
      <label>Course Name</label>
      <input type="text" [(ngModel)]="course.name" placeholder="Enter course name" />
    </div>

    <div class="form-group">
      <label>Course Code</label>
      <input type="text" [(ngModel)]="course.code" placeholder="e.g. CS101" />
    </div>

    <div class="form-group">
      <label>Credits</label>
      <input type="number" [(ngModel)]="course.credits" placeholder="e.g. 3" />
    </div>

    <button (click)="updateCourse()" style="width: 100%; margin-top: 10px;">Update Course</button>
  </div>
</div>
