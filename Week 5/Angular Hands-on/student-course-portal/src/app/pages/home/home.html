<h1>{{ portalName }}</h1>

<p>
  This portal allows students to browse courses, enroll in subjects,
  view their profile, and manage academic information.
</p>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br>

<label>Search Course:</label>
<input
  type="text"
  placeholder="Enter course name..."
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<div class="stats">
  <div class="card">
    <h3>Courses Available</h3>
    <p>12</p>
  </div>

  <div class="card">
    <h3>Enrolled</h3>
    <p>3</p>
  </div>

  <div class="card">
    <h3>GPA</h3>
    <p>3.8</p>
  </div>
</div>
