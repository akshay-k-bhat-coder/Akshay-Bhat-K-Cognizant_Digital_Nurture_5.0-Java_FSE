<h1>{{ portalName }}</h1>

<p>Welcome to the Student Course Portal.</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<label>Search Course:</label>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Enter course name">

<p>Searching for: {{ searchTerm }}</p>
