<app-header></app-header>

<!-- Mock Login Status bar -->
<div style="background: rgba(245, 158, 11, 0.1); border-bottom: 1px solid rgba(245, 158, 11, 0.2); padding: 8px 40px; display: flex; align-items: center; gap: 15px; font-size: 0.85rem;">
  <span style="font-weight: 600;">Mock Auth State:</span>
  <span [style.color]="authService.isLoggedIn ? 'var(--success)' : 'var(--danger)'" style="font-weight: bold;">
    {{ authService.isLoggedIn ? 'Logged In (Profile & Enroll Accessible)' : 'Logged Out (Profile & Enroll Restricted)' }}
  </span>
  <button (click)="toggleLogin()" class="btn" style="padding: 4px 10px; font-size: 0.75rem; background: var(--primary);">
    Toggle Auth State
  </button>
</div>

<!-- Global Loading Progress Bar -->
<div *ngIf="isLoading$ | async" style="position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: loadingBar 1.5s infinite; z-index: 9999;"></div>

<router-outlet></router-outlet>
